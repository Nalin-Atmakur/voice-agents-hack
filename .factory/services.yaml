commands:
  build-device: xcrun xcodebuild -project TacNet.xcodeproj -scheme TacNet -configuration Debug -destination 'generic/platform=iOS' -sdk iphoneos build CODE_SIGNING_ALLOWED=NO
  build-sim: xcrun xcodebuild -project TacNet.xcodeproj -scheme TacNet -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17 Pro' build CODE_SIGNING_ALLOWED=NO
  test: xcrun xcodebuild -project TacNet.xcodeproj -scheme TacNet -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17 Pro' test CODE_SIGNING_ALLOWED=NO
